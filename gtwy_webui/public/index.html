<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeshArranger Gateway Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        --bg: #101114;
        --panel: #191c24;
        --panel-2: #1f2330;
        --text: #e8ecff;
        --muted: #9aa2bf;
        --accent: #4ecdc4;
        --ok: #90ee90;
        --warn: #ffe27a;
        --bad: #ff7777;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        color: var(--text);
        background: radial-gradient(circle at top, #191d27 0%, var(--bg) 55%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .page {
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
        padding: 12px;
      }

      .toolbar {
        background: var(--panel);
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #252a3a;
      }

      .toolbar h1 {
        margin: 0;
        font-size: 18px;
      }

      .toolbar-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .toolbar-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toolbar .status {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .toolbar input {
        width: 280px;
        background: #111523;
        color: #e9edff;
        border: 1px solid #2f3650;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .toolbar button {
        background: #2a324d;
        border: 1px solid #405078;
        color: #ecf0ff;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }

      .toolbar-meta {
        display: flex;
        gap: 16px;
        font-size: 12px;
        flex-wrap: wrap;
      }

      .version-line {
        margin-top: 6px;
        color: #a0adce;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        flex: 0 0 auto;
      }

      .bottom {
        flex: 1 1 auto;
        min-height: 200px;
      }

      .pane {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid #252a3a;
        border-radius: 10px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        min-height: 220px;
      }

      .pane h2 {
        margin: 0 0 8px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #ccd6ff;
      }

      .row {
        margin: 3px 0;
      }

      .k {
        color: var(--muted);
        min-width: 120px;
        display: inline-block;
      }

      .ok {
        color: var(--ok);
      }

      .warn {
        color: var(--warn);
      }

      .bad {
        color: var(--bad);
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      .message-list {
        margin: 0;
        padding: 8px 0 0;
        list-style: none;
        flex: 1;
        overflow: auto;
      }

      .message-list li {
        border-bottom: 1px solid #242a3a;
        padding: 6px 0;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .error {
        color: var(--bad);
        margin-top: 6px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .toolbar input {
          width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const { useEffect, useMemo, useState } = React
      const MAX_MESSAGES = 250

      function normalizeGateway(value) {
        const v = String(value || '').trim()
        if (!v) {
          return ''
        }
        if (/^https?:\/\//i.test(v)) {
          return v.replace(/\/$/, '')
        }
        return `http://${v}`.replace(/\/$/, '')
      }

      function fmtTime(ms) {
        if (!ms) return 'n/a'
        const d = new Date(ms)
        return d.toLocaleTimeString() + '.' + String(d.getMilliseconds()).padStart(3, '0')
      }

      function asJson(v) {
        if (v === null || v === undefined) return ''
        try {
          return JSON.stringify(v)
        } catch (_err) {
          return String(v)
        }
      }

      function StatusPane({ status }) {
        return React.createElement('section', { className: 'pane' },
          React.createElement('h2', null, 'Gateway status'),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'status:'), React.createElement('span', { className: status.status === 'ok' ? 'ok' : 'warn' }, status.status || 'waiting')),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'node_id:'), React.createElement('span', null, status.node_id || '--')),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'channel:'), React.createElement('span', null, status.wifi_channel || '--')),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'rx packets:'), React.createElement('span', null, status.espnow ? status.espnow.rx_packets : '--')),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'rx dropped:'), React.createElement('span', null, status.espnow ? status.espnow.rx_dropped : '--')),
          React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'rx queue:'), React.createElement('span', null, status.rx_queue_depth !== undefined ? status.rx_queue_depth : '--')),
          React.createElement('pre', { className: 'muted', style: { marginTop: '12px', fontSize: '11px', overflow: 'auto' } }, asJson(status.espnow))
        )
      }

      function NodesPane({ nodes }) {
        const list = useMemo(() => Array.isArray(nodes.nodes) ? nodes.nodes : [], [nodes])
        return React.createElement('section', { className: 'pane' },
          React.createElement('h2', null, `Active nodes (${list.length})`),
          list.length === 0
            ? React.createElement('div', { className: 'muted' }, 'No active nodes yet')
            : React.createElement('ul', null, list.map((node) =>
              React.createElement('li', { key: node.node_id || Math.random() },
                React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'node:'), React.createElement('span', null, node.node_id || 'unknown')),
                React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'name:'), React.createElement('span', null, node.name || 'unnamed')),
                React.createElement('div', { className: 'row' }, React.createElement('span', { className: 'k' }, 'role:'), React.createElement('span', null, node.role || 'n/a'))
              )
            ))
        )
      }

      function MessagePane({ messages }) {
        return React.createElement('section', { className: 'pane bottom' },
          React.createElement('h2', null, `Messages (${messages.length})`),
          React.createElement('ul', { className: 'message-list' },
            messages.length === 0
              ? React.createElement('li', { className: 'muted' }, 'No messages yet')
              : messages.map((msg) =>
                React.createElement('li', { key: msg.id || Math.random() },
                  React.createElement('div', { className: 'row' },
                    React.createElement('span', { className: 'k' }, 'peer:'),
                    React.createElement('span', null, msg.peer_id || 'unknown'),
                    React.createElement('span', { className: 'muted', style: { marginLeft: 10 } }, fmtTime(msg.ts_ms))
                  ),
                  React.createElement('div', { className: 'row', style: { whiteSpace: 'pre-wrap' } }, asJson(msg.message))
                )
              )
          )
        )
      }

      function App() {
        const initialGateway = normalizeGateway(localStorage.getItem('gtwyGateway') || '192.168.8.195:80')

        const [gatewayInput, setGatewayInput] = useState(initialGateway)
        const [gateway, setGateway] = useState(initialGateway)
        const [status, setStatus] = useState({ status: 'connecting' })
        const [nodes, setNodes] = useState({ nodes: [] })
        const [messages, setMessages] = useState([])
        const [connected, setConnected] = useState(false)
        const [isSaving, setIsSaving] = useState(false)
        const [uiVersion, setUiVersion] = useState('unknown')
        const [gatewayVersion, setGatewayVersion] = useState('unknown')
        const [message, setMessage] = useState('')

        useEffect(() => {
          localStorage.setItem('gtwyGateway', gateway)
          setMessage('Connecting...')
          const source = new EventSource(`/api/events?gateway=${encodeURIComponent(gateway)}`)

          const refreshVersions = (gatewayVersionPayload) => {
            if (gatewayVersionPayload && gatewayVersionPayload.gateway) {
              const g = gatewayVersionPayload.gateway
              setGatewayVersion(g.version || 'unknown')
            }

            if (gatewayVersionPayload && gatewayVersionPayload.ui) {
              setUiVersion(gatewayVersionPayload.ui.version || uiVersion)
            }
          }

          const onWelcome = (ev) => {
            setMessage('SSE welcome received')
            try {
              const payload = JSON.parse(ev.data)
              setUiVersion(payload.ui_version || 'unknown')
            } catch (_err) {
              // keep existing uiVersion
            }
            setIsSaving(false)
          }

          const onStatus = (ev) => {
            try {
              const payload = JSON.parse(ev.data)
              setStatus(payload)
            } catch (_err) {
              setStatus({ status: 'invalid_status_payload' })
            }
            setConnected(true)
            setMessage('Connected to gateway via SSE')
            setIsSaving(false)
          }

          const onNodes = (ev) => {
            try {
              const payload = JSON.parse(ev.data)
              setNodes(payload || { nodes: [] })
            } catch (_err) {
              setNodes({ nodes: [] })
            }
          }

          const onMessage = (ev) => {
            try {
              const msg = JSON.parse(ev.data)
              setMessages((prev) => prev.concat([msg]).slice(-MAX_MESSAGES))
            } catch (_err) {
              // ignore malformed event payloads
            }
          }

          const onVersion = (ev) => {
            try {
              const payload = JSON.parse(ev.data)
              setGatewayVersion(payload && payload.gateway ? payload.gateway.version : gatewayVersion)
              if (payload && payload.ui && payload.ui.version) {
                setUiVersion(payload.ui.version)
              }
              refreshVersions(payload)
            } catch (_err) {
              // ignore
            }
          }

          const onError = () => {
            setConnected(false)
            setMessage('SSE connection error. Check gateway endpoint and WebUI logs.')
          }

          const onOpen = () => {
            // fetch versions again after connection; this path does not block the stream
            fetch(`/api/version?gateway=${encodeURIComponent(gateway)}`)
              .then((res) => res.ok ? res.json() : Promise.reject(new Error('version endpoint unreachable')))
              .then((payload) => refreshVersions(payload))
              .catch(() => {
                setGatewayVersion('unreachable')
              })
          }

          source.addEventListener('welcome', onWelcome)
          source.addEventListener('status', onStatus)
          source.addEventListener('nodes', onNodes)
          source.addEventListener('message', onMessage)
          source.addEventListener('version', onVersion)
          source.addEventListener('error', onError)
          source.onopen = onOpen

          return () => {
            source.removeEventListener('welcome', onWelcome)
            source.removeEventListener('status', onStatus)
            source.removeEventListener('nodes', onNodes)
            source.removeEventListener('message', onMessage)
            source.removeEventListener('version', onVersion)
            source.removeEventListener('error', onError)
            source.close()
          }
        }, [gateway])

        const saveGateway = () => {
          const target = normalizeGateway(gatewayInput)
          if (!target) {
            return
          }
          setConnected(false)
          setIsSaving(true)
          setMessages([])
          setGateway(target)
          setMessage('Switching gateway target...')
        }

        return React.createElement('div', { className: 'page' },
          React.createElement('header', { className: 'toolbar' },
            React.createElement('div', { className: 'toolbar-top' },
              React.createElement('h1', null, 'DistNet Gateway Dashboard'),
              React.createElement('div', { className: 'toolbar-controls' },
                React.createElement('input', {
                  value: gatewayInput,
                  onChange: (ev) => setGatewayInput(ev.target.value),
                  placeholder: 'Gateway IP or URL'
                }),
                React.createElement('button', { onClick: saveGateway, disabled: isSaving }, isSaving ? 'Connecting...' : 'Connect'),
                React.createElement('span', {
                  className: connected ? 'status ok' : 'status bad'
                }, connected ? 'SSE connected' : 'SSE disconnected')
              )
            ),
            React.createElement('div', { className: 'toolbar-meta' },
              React.createElement('span', { className: 'version-line' }, `UI version: ${uiVersion}`),
              React.createElement('span', { className: 'version-line' }, `Gateway version: ${gatewayVersion}`),
              React.createElement('span', { className: 'version-line' }, `Target: ${gateway}`)
            ),
            React.createElement('div', { className: message ? 'status bad' : 'status ok' }, message),
            React.createElement('div', { className: 'version-line' }, `Cache-busting disabled: /api responses are no-store`)
          ),
          React.createElement('div', { className: 'grid' },
            React.createElement(StatusPane, { status }),
            React.createElement(NodesPane, { nodes })
          ),
          React.createElement(MessagePane, { messages })
        )
      }

      const container = ReactDOM.createRoot(document.getElementById('root'))
      container.render(React.createElement(App))
    </script>
  </body>
</html>
